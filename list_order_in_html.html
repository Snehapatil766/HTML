<!DOCTYPE html>
<html>
<head>
    <title>HTML List Tags</title>
</head>
<body>

<h2>Ordered List Example</h2>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<h2>Unordered List Example</h2>
<ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Mango</li>
</ul>

<h2>Description List Example</h2>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>
    
    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
    
    <dt>JS</dt>
    <dd>JavaScript Programming Language</dd>
</dl>

</body>
</html>
