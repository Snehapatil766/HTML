<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>

<body style="font-family: Arial; background-color:#f2f2f2;">

<form action="submit.html" style="background:white; width:500px; margin:auto; padding:20px; border-radius:10px;">

<center>
<h1 style="color:blue;">Registration Form</h1>
</center>

<p style="font-weight:bold;">Name:</p>
<input type="text" placeholder="First Name" required style="padding:5px; margin:5px;">
<input type="text" placeholder="Middle Name" required style="padding:5px; margin:5px;">
<input type="text" placeholder="Last Name" required style="padding:5px; margin:5px;">
<br>

<p style="font-weight:bold;">Date of Birth:</p>
<input type="date" required style="padding:5px; margin:5px;">
<br>

<p style="font-weight:bold;">Mobile No.:</p>
<input type="tel" placeholder="Mobile no." required style="padding:5px; margin:5px;">
<br>

<p style="font-weight:bold;">Address :</p>
<input type="text" placeholder="Address" required style="padding:5px; margin:5px; width:90%;">
<br>

<p style="font-weight:bold;">College Name :</p>
<input type="text" placeholder="College name" required style="padding:5px; margin:5px; width:90%;">
<br>

<p style="font-weight:bold;">Select Branch :</p>
<select style="padding:5px; margin:5px;">
<option>Select Branch</option>
<option>CSE</option>
<option>AIML</option>
<option>DS</option>
<option>Mechanical</option>
<option>Electrical</option>
<option>Civil</option>
<option>Chemical</option>
<option>ENTC</option>
</select>
<br>

<p style="font-weight:bold;">Technical Skills :</p>
<input type="checkbox"> C
<input type="checkbox"> C++
<input type="checkbox"> Java
<input type="checkbox"> Python
<input type="checkbox"> HTML
<input type="checkbox"> CSS
<input type="checkbox"> Javascript
<input type="checkbox"> SQL
<input type="checkbox"> MongoDB
<br><br>

<p style="font-weight:bold;">Gender :</p>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<br><br>

<button type="submit" style="background-color:blue; color:white; padding:10px 20px; border:none; border-radius:5px;">
Submit
</button>

</form>

</body>
</html>
